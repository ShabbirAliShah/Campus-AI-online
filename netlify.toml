# ══════════════════════════════════════════════
#  Campus AI — netlify.toml
#  Deploy config + security headers + caching
# ══════════════════════════════════════════════

[build]
  publish = "."          # root folder = site root
  # command = ""         # no build step needed for static site

# ── SECURITY & PERFORMANCE HEADERS ──────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME sniffing
    X-Content-Type-Options = "nosniff"
    # XSS protection (legacy browsers)
    X-XSS-Protection = "1; mode=block"
    # HTTPS only (1 year)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions policy — disable unused browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()"
    # Content Security Policy
    # Allows: self, CDN for marked.js, all AI/image APIs called client-side
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.googletagmanager.com https://www.google-analytics.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https://image.pollinations.ai https://api-inference.huggingface.co;
      connect-src 'self'
        https://api.groq.com
        https://openrouter.ai
        https://generativelanguage.googleapis.com
        https://image.pollinations.ai
        https://api-inference.huggingface.co
        https://www.google-analytics.com
        https://cdn.jsdelivr.net;
      worker-src 'self';
      manifest-src 'self';
      form-action 'none';
      base-uri 'self';
      frame-ancestors 'none';
    """

# ── CACHE STATIC ASSETS (1 year) ─────────────────
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── HTML — revalidate each visit ─────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Manifest & SW ────────────────────────────────
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── SPA FALLBACK ─────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── FORCE HTTPS ──────────────────────────────────
[[redirects]]
  from   = "http://campus-ai.leisurecampus.com/*"
  to     = "https://campus-ai.leisurecampus.com/:splat"
  status = 301
  force  = true

# ── WWW → non-WWW ────────────────────────────────
[[redirects]]
  from   = "https://www.campus-ai.leisurecampus.com/*"
  to     = "https://campus-ai.leisurecampus.com/:splat"
  status = 301
  force  = true
